name: Integration

on: [push]

jobs:
  build:
    runs-on: ubuntu-latest  # Changed from 20.04 to latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4 # Updated to v4

      - name: Setup Go
        uses: actions/setup-go@v5 # Updated to v5
        with:
          go-version: "1.21" # Newer Go version

      - name: Build
        run: go build .